[build]
  command = "npm install --os=linux --cpu=x64 && npx vite build --config vite.config.js"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = []

# Ensure Node 20+ for native fetch support and modern package compatibility
[build.environment]
  NODE_VERSION = "20"
